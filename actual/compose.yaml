services:
  actual:
    image: docker.io/actualbudget/actual-server:sha-8f2302e-alpine  # keep your current pin, or move to a version tag
    container_name: actual
    environment:
      - TZ=${TZ}
    volumes:
      - ${APPDATA}/actual:/data
    networks:
      default: {}          # private to this project; nothing else is on it
      proxy:               # shared with cloudflared for ingress only
        aliases:
          - actual         # cloudflared reaches it as http://actual:5006
    healthcheck:
      test: ['CMD-SHELL', 'node scripts/health-check.js']
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    # No ports published: cloudflared reaches it over the proxy network.
    # Uncomment only if you also want direct LAN access:
    # ports:
    #   - "5006:5006"

networks:
  default: {}
  proxy:
    external: true         # created once with: docker network create proxy
